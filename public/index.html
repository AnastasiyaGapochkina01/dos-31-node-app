<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Node dual mode demo</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Node dual mode demo</h1>
    <p>One Dockerfile, two targets: static build and server mode.</p>
    <div class="grid">
      <section class="card">
        <h2>Static mode</h2>
        <p>Container serves only built files from <code>dist/</code>.</p>
      </section>
      <section class="card">
        <h2>Server mode</h2>
        <p>Express serves static files and API endpoints.</p>
        <button id="load">Check API</button>
        <pre id="result">Click the button</pre>
      </section>
    </div>
  </main>
  <script>
    document.getElementById('load').addEventListener('click', async () => {
      const res = await fetch('/api/message');
      const data = await res.json();
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
